# blog-contents の sync がこのリポジトリへ出力する際のファイル配置。
# blog-contents 側コードではなくこのリポジトリが配置を所有する。
# Notion 由来の生成物は content/notion/ に集約し、src/ 配下にはコードのみ置く。
postsDir: content/notion/posts
imagesDir: public/images
videosDir: .tmp/r2-staging/videos
manifestPath: manifest.json
propertyOutputs:
  tags: content/notion/tags.json
  channels: content/notion/channels.json
