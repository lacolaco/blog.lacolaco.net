name: trigger-blog-contents-sync

on:
  issue_comment:
    types: [created]
  push:
    branches: [main]

# 連打 / 複数 main push を debounce、blog-contents 側 sync workflow の concurrency と協調
# group キーは以下の 2 軸で scope:
#   - event_name: comment-trigger と push-trigger が互いを cancel しないように分離
#   - issue.number (comment 時) / 'push' (push 時): PR ごと / push 全体で独立した group に
# こうすることで silent-drop UX バグを以下のいずれの軸でも回避できる:
#   - `.sync` コメント実行中に main push が来ても comment-trigger は cancel されない
#   - PR #1 の `.sync` 実行中に PR #2 の `.sync` が来ても PR #1 は cancel されない
concurrency:
  group: dispatch-blog-contents-sync-${{ github.event_name }}-${{ github.event.issue.number || 'push' }}
  cancel-in-progress: true

jobs:
  comment-trigger:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      checks: read
    steps:
      - uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        id: command
        with:
          command: '.sync'
          allowed_contexts: pull_request
          reaction: 'eyes'
          skip_ci: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowlist: lacolaco

      # blog-contents への repository_dispatch には GITHUB_TOKEN だと権限不足のため App token を発行
      - name: Generate App token (for blog-contents dispatch)
        id: app-token
        if: ${{ steps.command.outputs.continue == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: lacolaco
          repositories: blog-contents

      - name: Dispatch sync workflow in blog-contents
        if: ${{ steps.command.outputs.continue == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'lacolaco',
              repo: 'blog-contents',
              event_type: 'notion-sync-blog-lacolaco',
            });

  # main push 時にも dispatch を投げ、blog-contents 側の既存 sync PR を最新 main base で refresh する
  # (renovate / 人手 PR / sync PR merge → main 更新 → 既存 sync PR が base behind になる問題への対処)
  push-trigger:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate App token (for blog-contents dispatch)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: lacolaco
          repositories: blog-contents

      - name: Dispatch sync workflow in blog-contents
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'lacolaco',
              repo: 'blog-contents',
              event_type: 'notion-sync-blog-lacolaco',
            });

  # main push 時に自リポの open な auto-translate PR を main に追従させる。
  # GitHub auto-merge は base behind を自動解決しないため、push-trigger と同じ責務 (main 更新で
  # behind になる PR を refresh する) の自リポ側実装として並置する。
  refresh-auto-translate-prs:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate App token (for self repo)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}

      - name: Update stale auto-translate PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # --limit を明示しないと default 30 件で頭打ちになり、auto-translate PR が滞留したときに古いものから漏れる。
          PRS=$(gh pr list --state open --limit 100 --json number,headRefName \
            --jq '.[] | select(.headRefName | startswith("auto-translate/")) | .number')
          if [[ -z "$PRS" ]]; then
            echo "No open auto-translate PRs"
            exit 0
          fi
          # gh pr update-branch の出力をケース分け:
          #   - 成功 (新 merge commit 追加): 普通の info
          #   - 既に最新: info (PR が既に追従済みなだけで異常ではない)
          #   - それ以外 (conflict / auth / network 等): warning で個別 PR を記録するが job は止めない
          #     (batch の他 PR を止めず、次の push で再試行できるように warning に留める)
          for PR in $PRS; do
            echo "::group::PR #$PR"
            if output=$(gh pr update-branch "$PR" 2>&1); then
              echo "$output"
            elif echo "$output" | grep -qi "already up.to.date"; then  # `.` は space と `-` の両方にマッチ
              echo "PR #$PR is already up to date"
            else
              echo "::warning::Failed to update PR #$PR (possible conflict): $output"
            fi
            echo "::endgroup::"
          done
