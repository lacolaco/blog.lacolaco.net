name: trigger-sync-from-pr-comment

on:
  issue_comment:
    types: [created]
  push:
    branches: [main]

# 連打 / 複数 main push を debounce、blog-contents 側 sync workflow の concurrency と協調
concurrency:
  group: dispatch-blog-contents-sync
  cancel-in-progress: true

jobs:
  comment-trigger:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      checks: read
    steps:
      - uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        id: command
        with:
          command: '.sync'
          allowed_contexts: pull_request
          reaction: 'eyes'
          skip_ci: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowlist: lacolaco

      # blog-contents への repository_dispatch には GITHUB_TOKEN だと権限不足のため App token を発行
      - name: Generate App token (for blog-contents dispatch)
        id: app-token
        if: ${{ steps.command.outputs.continue == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: lacolaco
          repositories: blog-contents

      - name: Dispatch sync workflow in blog-contents
        if: ${{ steps.command.outputs.continue == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'lacolaco',
              repo: 'blog-contents',
              event_type: 'notion-sync-blog-lacolaco',
            });

  # main push 時にも dispatch を投げ、blog-contents 側の既存 sync PR を最新 main base で refresh する
  # (renovate / 人手 PR / sync PR merge → main 更新 → 既存 sync PR が base behind になる問題への対処)
  push-trigger:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate App token (for blog-contents dispatch)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: lacolaco
          repositories: blog-contents

      - name: Dispatch sync workflow in blog-contents
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'lacolaco',
              repo: 'blog-contents',
              event_type: 'notion-sync-blog-lacolaco',
            });
