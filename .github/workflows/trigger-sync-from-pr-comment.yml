name: trigger-blog-contents-sync

on:
  issue_comment:
    types: [created]
  push:
    branches: [main]

# 連打 / 複数 main push を debounce、blog-contents 側 sync workflow の concurrency と協調
# group キーは以下の 2 軸で scope:
#   - event_name: comment-trigger と push-trigger が互いを cancel しないように分離
#   - issue.number (comment 時) / 'push' (push 時): PR ごと / push 全体で独立した group に
# こうすることで silent-drop UX バグを以下のいずれの軸でも回避できる:
#   - `.sync` コメント実行中に main push が来ても comment-trigger は cancel されない
#   - PR #1 の `.sync` 実行中に PR #2 の `.sync` が来ても PR #1 は cancel されない
concurrency:
  group: dispatch-blog-contents-sync-${{ github.event_name }}-${{ github.event.issue.number || 'push' }}
  cancel-in-progress: true

jobs:
  comment-trigger:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      checks: read
    steps:
      - uses: github/command@3442f3fa1efe01bdb024b157083c337902d17372 # v2.0.3
        id: command
        with:
          command: '.sync'
          allowed_contexts: pull_request
          reaction: 'eyes'
          skip_ci: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowlist: lacolaco

      # blog-contents への repository_dispatch には GITHUB_TOKEN だと権限不足のため App token を発行
      - name: Generate App token (for blog-contents dispatch)
        id: app-token
        if: ${{ steps.command.outputs.continue == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: lacolaco
          repositories: blog-contents

      - name: Dispatch sync workflow in blog-contents
        if: ${{ steps.command.outputs.continue == 'true' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'lacolaco',
              repo: 'blog-contents',
              event_type: 'notion-sync-blog-lacolaco',
            });

  # blog-contents 側 sync PR を最新 main base で refresh するための dispatch
  # (main 更新で sync PR が base behind になる問題への対処)
  dispatch-blog-contents-sync:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate App token (for blog-contents dispatch)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: lacolaco
          repositories: blog-contents

      - name: Dispatch sync workflow in blog-contents
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'lacolaco',
              repo: 'blog-contents',
              event_type: 'notion-sync-blog-lacolaco',
            });

  # auto-translate.yml は content/notion/posts/ 変更を含む push しか自動起動しない。
  # コード push でも main は進むので、追従していない翻訳 PR を捕まえるため明示的に再送する。
  dispatch-auto-translate:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate App token (for self repo)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Re-dispatch auto-translate workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: gh workflow run auto-translate.yml --ref main
