name: auto-translate

# main に新規 ja content がマージされた後、en 翻訳を生成して別 PR で提案する。
# consumer 自身が PR 作成者となり、blog-contents 作成 PR には触らない。
# ci.yml (validation) とは責務 (content 生成) が異なるため別 workflow file で分離。
# 詳細設計: lacolaco/blog-contents docs/plans/009-extract-public-consumer-syncs.md (Phase 3A Step 4, Option N)
on:
  push:
    branches: [main]
    paths:
      - 'content/notion/posts/**/*.md'
      - '!content/notion/posts/**/*.en.md' # en 自身の変更では起動しない (無限ループ防止)
  workflow_dispatch:
    # 任意 SHA に対する手動再実行 (en PR 作成途中の失敗復旧等)
    inputs:
      sha:
        description: 'main の commit SHA (省略時は現在の main HEAD)'
        required: false
        type: string

# 同 PR への並行 force-push を防ぐため直列化する
concurrency:
  group: auto-translate
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    # checkout / push / PR 作成は全て App token で完結。GITHUB_TOKEN は不使用。
    # `permissions:` を明示すると他は全て none になる
    permissions:
      contents: read
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # workflow_dispatch で sha が指定されていればそれを使い、なければ trigger commit
          ref: ${{ github.event.inputs.sha || github.sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # tsx --env-file は対象ファイル不存在で起動失敗するため空 .env で workaround
      - run: touch .env

      - name: Auto-translate ja → en
        run: pnpm run auto-translate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Create or update auto-translate PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COMMIT_SHA: ${{ github.event.inputs.sha || github.sha }}
        run: |
          if [[ -z "$(git status --porcelain content/notion/posts)" ]]; then
            echo "No translation changes"
            exit 0
          fi
          # 固定ブランチに翻訳結果を毎回 force-push し、PR は 1 本を再利用する
          # (SHA ごとに別ブランチ + 別 PR を作る設計は base behind や PR 分裂の原因になる)
          BRANCH="auto-translate"
          git config user.name "lacolaco-actions-worker[bot]"
          git config user.email "lacolaco-actions-worker[bot]@users.noreply.github.com"
          # 旧デザイン (SHA ベースブランチ auto-translate/<sha>) の残骸が残っていると
          # git ref の directory/file 衝突で push が失敗する。push 前にクリーンアップする
          # SHA 形式 (7-40桁の hex) のみ削除し、意図しないブランチの誤削除を防ぐ
          # 削除失敗は || true で許容する (best-effort: 本来の翻訳処理を止めない)
          for ref in $(git ls-remote --heads origin "refs/heads/${BRANCH}/*" | awk '{print $2}'); do
            branch_name="${ref#refs/heads/}"
            suffix="${branch_name#${BRANCH}/}"
            if [[ "$suffix" =~ ^[0-9a-f]{7,40}$ ]]; then
              echo "Deleting stale SHA-based ref: $ref"
              git push origin --delete "$branch_name" || true
            else
              echo "Skipping non-SHA ref: $ref"
            fi
          done
          # fetch-depth:1 の checkout では remote-tracking ref がないため、
          # --force-with-lease を機能させるには明示的に fetch する必要がある
          git fetch origin "$BRANCH" || true
          git checkout -B "$BRANCH"
          git add content/notion/posts
          git commit -m "chore: auto-translate ja → en for ${COMMIT_SHA}"
          git push --force-with-lease origin "$BRANCH"

          # 初回のみ作成、以降は force-push が synchronize イベントで CI を再起動するだけで PR 再利用
          if [[ "$(gh pr list --state open --head "$BRANCH" --json number --jq 'length')" -eq 0 ]]; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore: auto-translate ja → en" \
              --body "Latest automated translation (force-pushed on every main update)."
          fi
