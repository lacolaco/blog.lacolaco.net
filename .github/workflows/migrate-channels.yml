name: Migrate channels to Notion

# mainマージ時に一度だけ実行。冪等なので再実行しても安全。
# マイグレーション完了後にこのファイルごと削除する。

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'tools/migrate-channels/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lacolaco'
      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run migration
        run: |
          pnpm migrate-channels -- --apply 2>&1 | tee /tmp/migrate-output.txt
          exit ${PIPESTATUS[0]}
        env:
          NOTION_AUTH_TOKEN: ${{ secrets.NOTION_AUTH_TOKEN }}
      - name: Output logs to summary
        if: always()
        run: |
          echo '## Migration Log' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 /tmp/migrate-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
