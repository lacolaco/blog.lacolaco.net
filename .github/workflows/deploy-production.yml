name: deploy-production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Terraform変更検知で `git diff HEAD^ HEAD` を使うため、最低2コミット必要
          fetch-depth: 2

      - name: Google Auth
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: 'projects/348931464772/locations/global/workloadIdentityPools/github-actions-pool/providers/github-deploy'
          service_account: 'github-actions@blog-lacolaco-net.iam.gserviceaccount.com'

      - name: setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lacolaco'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm run build
        env:
          IMAGE_CDN_BASE_URL: ${{ vars.IMAGE_CDN_BASE_URL }}

      # --- Infra deploy (前段: 失敗時にCloud Runデプロイをブロックし split failure を回避) ---

      - name: Check Terraform changes
        id: tf-changed
        run: |
          # workflow_dispatch（手動起動）時は設定ドリフト修復用途として常にapply対象
          # infra/workflows/ 配下の yaml は workflow.tf の file() で参照されるため変更検知に含める
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD^ HEAD | grep -qE '^infra/(terraform|workflows)/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.tf-changed.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.14.5
          terraform_wrapper: false

      - name: Terraform Apply
        if: steps.tf-changed.outputs.changed == 'true'
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve

      # --- App deploy ---

      - name: Deploy to Cloud Run
        uses: ./.github/actions/deploy-cloudrun
        with:
          environment: 'production'
          image-tags: |
            asia-northeast1-docker.pkg.dev/blog-lacolaco-net/cloud-run-source-deploy/web:latest
            asia-northeast1-docker.pkg.dev/blog-lacolaco-net/cloud-run-source-deploy/web:${{ github.sha }}
          deploy-image: 'asia-northeast1-docker.pkg.dev/blog-lacolaco-net/cloud-run-source-deploy/web:${{ github.sha }}'
          revision-traffic: 'LATEST=100'
          # GCP_PROJECT_IDはCloud Runメタデータサーバーから取得するため不要
          env-vars: |
            FIRESTORE_DATABASE=likes-production
