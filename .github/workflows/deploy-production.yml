name: deploy-production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Terraform変更検知で `git diff HEAD^ HEAD` を使うため、最低2コミット必要
          fetch-depth: 2

      - name: Google Auth
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: 'projects/348931464772/locations/global/workloadIdentityPools/github-actions-pool/providers/github-deploy'
          service_account: 'github-actions@blog-lacolaco-net.iam.gserviceaccount.com'

      - name: setup pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lacolaco'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm run build
        env:
          IMAGE_CDN_BASE_URL: ${{ vars.IMAGE_CDN_BASE_URL }}

      - name: Deploy to Cloud Run
        uses: ./.github/actions/deploy-cloudrun
        with:
          environment: 'production'
          image-tags: |
            asia-northeast1-docker.pkg.dev/blog-lacolaco-net/cloud-run-source-deploy/web:latest
            asia-northeast1-docker.pkg.dev/blog-lacolaco-net/cloud-run-source-deploy/web:${{ github.sha }}
          deploy-image: 'asia-northeast1-docker.pkg.dev/blog-lacolaco-net/cloud-run-source-deploy/web:${{ github.sha }}'
          revision-traffic: 'LATEST=100'
          # GCP_PROJECT_IDはCloud Runメタデータサーバーから取得するため不要
          env-vars: |
            FIRESTORE_DATABASE=likes-production

      - name: Deploy Cloud Workflows
        run: |
          gcloud workflows deploy likes-export \
            --source=infra/workflows/likes-export.yaml \
            --location=asia-northeast1 \
            --project=blog-lacolaco-net \
            --service-account=likes-export-workflow@blog-lacolaco-net.iam.gserviceaccount.com

      - name: Check Terraform changes
        id: tf-changed
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q '^infra/terraform/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        if: steps.tf-changed.outputs.changed == 'true'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.5
          terraform_wrapper: false

      - name: Terraform Init
        if: steps.tf-changed.outputs.changed == 'true'
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Plan
        if: steps.tf-changed.outputs.changed == 'true'
        working-directory: infra/terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: steps.tf-changed.outputs.changed == 'true'
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan
