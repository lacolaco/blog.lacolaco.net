name: deploy-firestore-rules

on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Google Auth
        uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        with:
          workload_identity_provider: 'projects/348931464772/locations/global/workloadIdentityPools/github-actions-pool/providers/github-deploy'
          service_account: 'github-actions@blog-lacolaco-net.iam.gserviceaccount.com'

      - name: Deploy rules to likes-production
        run: |
          TOKEN=$(gcloud auth print-access-token)
          RULES_CONTENT=$(jq -Rs '.' < firestore.rules)

          RULESET_NAME=$(curl -sf -X POST \
            "https://firebaserules.googleapis.com/v1/projects/blog-lacolaco-net/rulesets" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"source\": {\"files\": [{\"name\": \"firestore.rules\", \"content\": $RULES_CONTENT}]}}" \
            | jq -r '.name')

          echo "Created ruleset: $RULESET_NAME"

          for DB in likes-production likes-preview; do
            curl -sf -X PATCH \
              "https://firebaserules.googleapis.com/v1/projects/blog-lacolaco-net/releases/cloud.firestore%2F${DB}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"release\": {\"rulesetName\": \"$RULESET_NAME\"}}" \
            || curl -sf -X POST \
              "https://firebaserules.googleapis.com/v1/projects/blog-lacolaco-net/releases" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"projects/blog-lacolaco-net/releases/cloud.firestore/${DB}\", \"rulesetName\": \"$RULESET_NAME\"}"
            echo "Deployed rules to $DB"
          done
