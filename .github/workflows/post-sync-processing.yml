name: post-sync-processing

# blog-contents から push される notion-sync-from-blog-contents PR が main に
# merge された後、auto-translate (ja → en) と R2 image sync を実行する。
# Notion からの取得自体は blog-contents 側 (sync-blog-lacolaco workflow) が担当する。

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

jobs:
  process:
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.head.ref, 'notion-sync-from-blog-contents'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: setup pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          run_install: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: 'pnpm'

      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: generate-token
        with:
          app-id: ${{ secrets.WORKER_APP_ID }}
          private-key: ${{ secrets.WORKER_APP_PRIVATE_KEY }}

      - run: pnpm install --frozen-lockfile
      - run: touch .env

      - name: Auto-translate ja → en for flagged articles
        run: pnpm run auto-translate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Sync images to Cloudflare R2
        run: pnpm r2-sync public/images
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

      - name: Create PR for translated content
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          commit-message: 'chore: post-sync processing (auto-translate + R2)'
          branch: post-sync-processing
          delete-branch: true
          title: 'chore: post-sync processing (auto-translate + R2)'
          body: 'Automated post-sync from notion-sync-from-blog-contents PR merge'
